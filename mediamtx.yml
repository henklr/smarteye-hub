# mediamtx.yml
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts:
  - hnkl.in

authMethod: internal
authInternalUsers:
  - user: apiuser
    pass: apipass
    ips: []
    permissions:
      - action: api

  - user: any
    pass:
    ips: []
    permissions:
      - action: read
        path: ~^cam-.*$

# sourceOnDemand: no — paths stay active 24/7 so the recording segmenter
# always has continuous input. Pre-buffer requires a permanent subscriber;
# on-demand mode would tear the source down 10s after the last live viewer.
pathDefaults:
  sourceOnDemand: no

paths: {}