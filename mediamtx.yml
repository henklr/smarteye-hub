# mediamtx.yml
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

# Low-latency HLS so the dashboard's live grid starts within ~1s.
# Defaults are MPEG-TS / 4s segments — far too slow for live tiles.
# fmp4 + lowLatency emits 200ms partial segments and supports
# blocking playlist reload, so hls.js can pick up the freshest part
# without waiting for a full segment to close.
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsAlwaysRemux: yes
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAllowOrigins: ['*']

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts:
  - hnkl.in

authMethod: internal
authInternalUsers:
  - user: apiuser
    pass: apipass
    ips: []
    permissions:
      - action: api

  - user: any
    pass:
    ips: []
    permissions:
      - action: read
        path: ~^cam-.*$

# sourceOnDemand: no — paths stay active 24/7 so the recording segmenter
# always has continuous input. Pre-buffer requires a permanent subscriber;
# on-demand mode would tear the source down 10s after the last live viewer.
pathDefaults:
  sourceOnDemand: no

paths: {}