# mediamtx.yml
api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts:
  - hnkl.in

authMethod: internal
authInternalUsers:
  - user: apiuser
    pass: apipass
    ips: []
    permissions:
      - action: api

  - user: any
    pass:
    ips: []
    permissions:
      - action: read
        path: ~^cam-.*$

pathDefaults:
  sourceOnDemand: yes
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s

paths: {}