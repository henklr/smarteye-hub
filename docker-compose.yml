services:
  api:
    build: .
    container_name: sei-raspi
    environment:
      - PORT=8000
      - MEDIAMTX_PUBLISH_URL=rtsp://mediamtx:8554/cam1
    ports:
      - "8000:8000"
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MTX_CONF=/mediamtx.yml