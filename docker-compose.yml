# docker-compose.yml
services:
  api:
    build: .
    container_name: sei-raspi
    restart: unless-stopped
    environment:
      - PORT=8000
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_API_USER=apiuser
      - MEDIAMTX_API_PASS=apipass
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"
      - "9997:9997"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MTX_CONF=/mediamtx.yml