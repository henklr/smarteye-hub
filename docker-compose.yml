# docker-compose.yml
services:
  api:
    build: .
    container_name: smarteye-hub
    restart: unless-stopped
    privileged: true
    pid: host
    env_file:
      - ./secrets/openai.env
    environment:
      - PORT=80
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_API_USER=${MEDIAMTX_API_USER:-apiuser}
      - MEDIAMTX_API_PASS=${MEDIAMTX_API_PASS:-apipass}
      - RECORDING_SEGMENT_SECONDS=2
      - RECORDING_MAX_PREBUFFER_SECONDS=600
      - RECORDING_BUFFER_MARGIN_SECONDS=60
      - RECORDING_TRIGGER_MAX_DURATION_SECONDS=60
      - RECORDING_CONTINUOUS_CAMERAS=
      - RECORDING_CONTINUOUS_CHUNK_SECONDS=3600
      - NVME_BASE=/mnt/nvme/smarteye
    ports:
      - "${PORT:-80}:80"
      - "443:443"
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      # Bind the parent /mnt (not /mnt/nvme directly): the parent mount stays
      # alive across a host umount/remount of /mnt/nvme, so the child mount
      # propagates in and out via rslave. Binding /mnt/nvme directly meant the
      # slave entry was destroyed on host umount and never came back, leaving
      # the container with an empty in-rootfs /mnt/nvme directory.
      - type: bind
        source: /mnt
        target: /mnt
        bind:
          propagation: rslave
          create_host_path: true
      - /sys/firmware/devicetree/base:/sys/firmware/devicetree/base:ro
      # PAM auth: mount host user database (read-only)
      - /etc/passwd:/etc/passwd:ro
      - /etc/shadow:/etc/shadow:ro
      - /etc/group:/etc/group:ro
      - /etc/pam.d:/etc/pam.d:ro
      - /etc/nsswitch.conf:/etc/nsswitch.conf:ro
      - /lib/aarch64-linux-gnu/security:/lib/aarch64-linux-gnu/security:ro
    extra_hosts:
      - "mediamtx:host-gateway"
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MTX_CONF=/mediamtx.yml
