# docker-compose.yml
services:
  api:
    build: .
    container_name: smarteye-hub
    restart: unless-stopped
    privileged: true
    environment:
      - PORT=80
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_API_USER=apiuser
      - MEDIAMTX_API_PASS=apipass
      - PLAYBACK_RECORDING_SCOPE=flow_cameras
      - PLAYBACK_CLIP_MODE=copy-first
      - PLAYBACK_CLIP_PRESET=ultrafast
      - PLAYBACK_CLIP_THREADS=1
      - PLAYBACK_CLIP_CACHE_LIMIT=8
      - RECORDING_SEGMENT_SECONDS=15
      - RECORDER_POLL_SECONDS=2
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
      - /sys/firmware/devicetree/base:/sys/firmware/devicetree/base:ro
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"
      - "9997:9997"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MTX_CONF=/mediamtx.yml