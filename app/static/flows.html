<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flows</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/flows.css" />
</head>

<body class="flowsPage">
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <img src="/static/smarteye-light.png" alt="SmartEye" class="topbarLogo">
        <img src="/static/smarteye-dark.png" alt="SmartEye" class="topbarLogoDark">
      </div>
      <div class="topbarCenter">
        <div class="tabs">
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab" href="/playback"><span class="tabDot"></span>Playback</a>
          <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
          <a class="tab active" href="/flows"><span class="tabDot"></span>Flows</a>
          <a class="tab" href="/settings"><span class="tabDot"></span>System</a>
        </div>
      </div>
      <div class="topbarActions">
        <button class="btn logoutBtn" id="logoutBtn" type="button" title="Sign out">Logout</button>
      </div>
    </div>

    <div class="flowsShell">
      <aside class="flowsSidebar">
        <div class="flowsSidebarBlock flowsSidebarSaved" data-sidebar-section="saved">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="saved" aria-controls="flowsSidebarSavedBody" aria-expanded="false" type="button">
            <span class="listTitle small">Flows</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarSavedBody">
            <input id="flowSearch" placeholder="Search flows" />

            <div id="flowList" class="flowList mt-10"></div>
          </div>
        </div>

        <div class="flowsSidebarBlock flowsSidebarVariables" data-sidebar-section="variables">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="variables" aria-controls="flowsSidebarVariablesBody" aria-expanded="false" type="button">
            <span class="listTitle small">Variables</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarVariablesBody">
            <input id="variableSearch" placeholder="Search variables" />

            <div id="publicVariableList" class="varList publicVariableList"></div>
          </div>
        </div>

        <div class="flowsSidebarBlock flowsSidebarScenarios" data-sidebar-section="scenarios">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="scenarios" aria-controls="flowsSidebarScenariosBody" aria-expanded="false" type="button">
            <span class="listTitle small">Scenarios</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarScenariosBody">
            <input id="scenarioSearch" placeholder="Search scenarios" />
            <div id="scenarioList" class="varList scenarioList"></div>
          </div>
        </div>

        <div class="flowsSidebarBlock flowsSidebarSchedules" data-sidebar-section="schedules">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="schedules" aria-controls="flowsSidebarSchedulesBody" aria-expanded="false" type="button">
            <span class="listTitle small">Schedules</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarSchedulesBody">
            <input id="scheduleSearch" placeholder="Search schedules" />

            <div id="scheduleList" class="varList scheduleList"></div>
          </div>
        </div>

        <div class="flowsSidebarBlock flowsSidebarPresets" data-sidebar-section="presets">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="presets" aria-controls="flowsSidebarPresetsBody" aria-expanded="false" type="button">
            <span class="listTitle small">Recording Tags</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarPresetsBody">
            <input id="presetSearch" placeholder="Search tags" />

            <div id="recordingPresetList" class="varList recordingPresetList"></div>
          </div>
        </div>

        <div class="flowsSidebarBlock flowsSidebarPalette" data-sidebar-section="palette">
          <button class="listHeader compact flowsSidebarSectionToggle" data-sidebar-toggle="palette" aria-controls="flowsSidebarPaletteBody" aria-expanded="false" type="button">
            <span class="listTitle small">Nodes</span>
            <span class="flowsSidebarToggleChevron" aria-hidden="true"></span>
          </button>

          <div class="flowsSidebarSectionBody" id="flowsSidebarPaletteBody">
            <input id="paletteSearch" placeholder="Search blocks" />

            <div id="paletteGroups" class="paletteGroups mt-10"></div>
          </div>
        </div>
      </aside>

      <section class="flowsMain">
        <div class="flowBoardWrap">
          <div class="flowBoardScroller" id="flowBoardScroller">
              <div class="flowBoard" id="flowBoard">
                <svg id="flowEdges" class="flowEdges"></svg>
                <div id="flowNodes" class="flowNodes"></div>
              </div>
              <div id="emptyBoardHint" class="emptyBoardHint hidden">Add blocks from the left palette to start building.
              </div>
          </div>
        </div>

        <div id="scheduleWorkspace" class="scheduleWorkspace hidden"></div>

        <div id="boardStatusLine" class="statusLine mt-12">
          <strong>Status:</strong> <span id="boardStatus" class="muted">Ready.</span>
        </div>
      </section>

      <aside class="flowsInspector">
        <div class="flowInspectorHeader">
          <div class="listTitle">Inspector</div>
          <div class="listSub" id="inspectorSubtext">Flow settings.</div>
        </div>

        <div id="inspectorBody" class="inspectorBody"></div>
      </aside>

      <div class="flowZoomBar">
        <button id="zoomOut" class="zoomBtn" title="Zoom out">−</button>
        <span id="zoomLabel" class="zoomLabel">100%</span>
        <button id="zoomIn" class="zoomBtn" title="Zoom in">+</button>
        <button id="zoomReset" class="zoomBtn zoomResetBtn" title="Reset zoom">⊙</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="/static/flows.js"></script>
</body>

</html>
