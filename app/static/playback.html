<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Playback</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/playback.css" />
</head>

<body class="playbackPage">
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <img src="/static/smarteye-light.png" alt="SmartEye" class="topbarLogo">
        <img src="/static/smarteye-dark.png" alt="SmartEye" class="topbarLogoDark">
      </div>
      <div class="topbarCenter">
        <div class="tabs">
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab active" href="/playback"><span class="tabDot"></span>Playback</a>
          <a class="tab" href="/flows"><span class="tabDot"></span>Flows</a>
          <a class="tab" href="/settings"><span class="tabDot"></span>System</a>
        </div>
      </div>
      <div class="topbarActions">
        <button class="btn logoutBtn" id="logoutBtn" type="button" title="Sign out">Logout</button>
      </div>
    </div>

    <div class="playbackShell">
      <div class="playbackViewerRegion">
        <section class="playbackViewerCard">
        <div class="listHeader compact playbackHeader">
          <div>
            <div class="listTitle small">Playback</div>
            <div class="listSub" id="playbackHeaderSub">Select a camera and marker to load a recorded clip.</div>
          </div>
          <div class="playbackHeaderActions">
          </div>
        </div>

        <div class="playbackVideoShell" id="playbackVideoShell">
          <video id="playbackVideo" class="playbackVideo" playsinline preload="metadata"></video>
          <div class="playbackVideoEmpty" id="playbackVideoEmpty" data-state="loading" aria-live="polite" aria-busy="true">
            <div class="playbackVideoEmptyPanel">
              <div class="playbackVideoEmptyBadge" id="playbackVideoEmptyBadge">Loading</div>
              <div class="playbackVideoEmptySpinner" aria-hidden="true"></div>
              <div class="playbackVideoEmptyTitle">Loading playback...</div>
              <div class="playbackVideoEmptyText" id="playbackVideoEmptyText">Fetching cameras and timeline markers for the selected day.</div>
            </div>
          </div>
        </div>

        </section>

        <div class="playbackControlsSection">
        <div class="playbackTransport" id="playbackTransport">
          <div class="playbackTransportButtons">
            <button class="btn btn-compact playbackTransportButton" id="playbackDirectionBackwardBtn" type="button" aria-pressed="false" aria-label="Backward" title="Backward">
              <span class="playbackTransportGlyph" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M11 7.5V16.5L4.5 12L11 7.5Z"></path>
                  <path d="M19.5 7.5V16.5L13 12L19.5 7.5Z"></path>
                </svg>
              </span>
            </button>
            <button class="btn btn-primary btn-compact playbackTransportButton" id="playbackPlayPauseBtn" type="button" aria-label="Play" title="Play">
              <span class="playbackTransportGlyph" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M8 6.5V17.5L17 12L8 6.5Z"></path>
                </svg>
              </span>
            </button>
            <button class="btn btn-compact playbackTransportButton" id="playbackStopBtn" type="button" aria-label="Stop" title="Stop">
              <span class="playbackTransportGlyph" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
                </svg>
              </span>
            </button>
            <button class="btn btn-compact playbackTransportButton" id="playbackDirectionForwardBtn" type="button" aria-pressed="true" aria-label="Forward" title="Forward">
              <span class="playbackTransportGlyph" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M5 7.5V16.5L11.5 12L5 7.5Z"></path>
                  <path d="M13.5 7.5V16.5L20 12L13.5 7.5Z"></path>
                </svg>
              </span>
            </button>
          </div>

          <div class="playbackSpeedControl">
            <label for="playbackSpeedInput">Speed</label>
            <input id="playbackSpeedInput" type="range" min="0.25" max="25" step="0.25" value="1" />
            <output id="playbackSpeedValue" class="playbackSpeedValue" for="playbackSpeedInput">1x</output>
          </div>
        </div>
        </div>
      </div>

      <section class="playbackTimelineCard">
        <div class="playbackTimelineWrap">
          <div class="playbackTimelineToolbar">
            <div class="playbackTimelineFilters" id="playbackTimelineFilters"></div>
            <div class="playbackTimelineSelectors">
              <div class="playbackTimelineSelector">
                <label for="playbackDeviceSelect">Camera</label>
                <select id="playbackDeviceSelect"></select>
              </div>
              <div class="playbackTimelineSelector">
                <label for="playbackDayInput">Day</label>
                <input id="playbackDayInput" type="date" />
              </div>
            </div>
          </div>
          <div class="playbackTimelineScale" id="playbackTimelineScale"></div>
          <div class="playbackTimelineTrack" id="playbackTimelineTrack"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="/static/playback.js"></script>
</body>

</html>
