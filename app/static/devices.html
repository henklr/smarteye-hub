<!-- static/devices.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Devices</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .split{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:14px;
      align-items:start;
    }
    @media (max-width:900px){ .split{ grid-template-columns:1fr; } }

    .table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
    }
    .table th, .table td{
      padding:10px 12px;
      font-size:13px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .table th{
      text-align:left;
      color:var(--muted);
      font-weight:800;
      user-select:none;
    }

    /* Clickable rows */
    .table tbody tr{
      cursor:pointer;
    }
    .table tbody tr:hover td{
      background: rgba(255,255,255,.04);
    }
    .table tbody tr.active td{
      background: rgba(122,162,255,.10);
    }
    .table tbody tr.active{
      outline: 2px solid rgba(122,162,255,.35);
      outline-offset: -2px;
    }

    .muted{ color:var(--muted); font-size:12px; }
    .okTag{ color:var(--ok); font-weight:800; }
    .badTag{ color:var(--danger); font-weight:800; }

    /* Put tabs left, status/actions right (same pattern as Live) */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      gap:12px;
    }
    .topbarLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .topbarRight{
      display:flex;
      align-items:center;
      gap:12px;
      margin-left:auto;
    }
  </style>
</head>

<body>
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <div class="tabs">
          <a class="tab" href="/"><span class="tabDot"></span>Home</a>
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab active" href="/devices"><span class="tabDot"></span>Devices</a>
          <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
        </div>
      </div>

      <div class="topbarRight">
        <!-- Refresh moved OUT of header area in JS/UX request,
             but leaving here as a fallback is fine; we will hide it via JS.
             If you want it gone entirely, delete this button. -->
        <button class="btn" id="refreshTop" style="display:none;">Reload</button>
      </div>
    </div>

    <div class="split">

      <!-- LEFT: list -->
      <div class="card">
        <div class="listHeader">
          <div>
            <div class="listTitle">Saved devices</div>
            <div class="listSub">Click a row to edit. Use Refresh to reload the list.</div>
          </div>
          <button class="btn" id="refresh">Refresh</button>
        </div>

        <div style="margin-top:12px; overflow:auto;">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>IP</th>
                <th>Ready</th>
              </tr>
            </thead>
            <tbody id="devTbody">
              <tr><td colspan="3" class="muted">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="statusLine" style="margin-top:12px;">
          <strong>Status:</strong> <span id="listStatus" class="muted">Idle</span>
        </div>
      </div>

      <!-- RIGHT: form -->
      <div class="card">
        <div style="font-weight:900; margin-bottom:8px;" id="formTitle">Add device</div>

        <div class="grid" style="grid-template-columns: 1fr 0.6fr; margin-top:0;">
          <div data-full>
            <label>Name</label>
            <input id="name" placeholder="Front Door" />
          </div>

          <div data-full>
            <label>Camera IP</label>
            <input id="ip" placeholder="192.168.1.108" />
          </div>

          <div>
            <label>ONVIF Port</label>
            <input id="onvif_port" value="80" />
          </div>

          <div>
            <label>Username</label>
            <input id="username" placeholder="admin" />
          </div>

          <div data-full>
            <label>Password</label>
            <input id="password" type="password" placeholder="••••••••" />
          </div>

          <button class="btn" id="fetchProfiles" data-full>Fetch profiles</button>

          <div data-full>
            <label>Profile (saved on device)</label>
            <select id="profiles" disabled>
              <option>Fetch profiles first…</option>
            </select>
          </div>
        </div>

        <div class="row2" style="margin-top:12px;">
          <button class="btn btn-primary" id="save">Save</button>
          <button class="btn" id="new">New</button>
          <button class="btn" id="clear">Clear</button>
          <button class="btn btn-danger" id="delete" disabled>Delete</button>
        </div>

        <div class="statusLine" style="margin-top:12px;">
          <strong>Status:</strong> <span id="formStatus" class="muted">Ready.</span>
        </div>
        
      </div>

    </div>
  </div>

  <script src="/static/devices.js"></script>
</body>
</html>
