<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Devices</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .split {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .split {
        grid-template-columns: 1fr;
      }
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .10);
    }

    .table th,
    .table td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .table th {
      text-align: left;
      color: var(--muted);
      font-weight: 800;
    }

    .table tr:hover td {
      background: rgba(255, 255, 255, .04);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-mini {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .okTag {
      color: var(--ok);
      font-weight: 800;
    }

    .badTag {
      color: var(--danger);
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Devices</h1>
        <div class="subtitle">Add device → Fetch profiles → Choose profile → Save</div>
      </div>
      <div class="headerRight">
        <button class="btn" id="refresh">Refresh</button>
        <div class="tabs">
          <a class="tab" href="/"><span class="tabDot"></span>Home</a>
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab active" href="/devices"><span class="tabDot"></span>Devices</a>
        </div>
      </div>
    </div>

    <div class="split">

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <div>
            <div style="font-weight:900;">Saved devices</div>
            <div class="muted">Click Edit to change credentials/profile.</div>
          </div>
        </div>

        <div style="margin-top:12px; overflow:auto;">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>IP</th>
                <th>Ready</th>
                <th style="width:180px;">Actions</th>
              </tr>
            </thead>
            <tbody id="devTbody">
              <tr>
                <td colspan="4" class="muted">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="statusLine" style="margin-top:12px;">
          <strong>Status:</strong> <span id="listStatus" class="muted">Idle</span>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:900; margin-bottom:8px;" id="formTitle">Add device</div>

        <div class="grid" style="grid-template-columns: 1fr 0.6fr; margin-top:0;">
          <div data-full>
            <label>Name</label>
            <input id="name" placeholder="Front Door" />
          </div>

          <div data-full>
            <label>Camera IP</label>
            <input id="ip" placeholder="192.168.1.108" />
          </div>

          <div>
            <label>ONVIF Port</label>
            <input id="onvif_port" value="80" />
          </div>

          <div>
            <label>Username</label>
            <input id="username" placeholder="admin" />
          </div>

          <div data-full>
            <label>Password</label>
            <input id="password" type="password" placeholder="••••••••" />
          </div>

          <button class="btn" id="fetchProfiles" data-full>Fetch profiles</button>

          <div data-full>
            <label>Profile (saved on device)</label>
            <select id="profiles" disabled>
              <option>Fetch profiles first…</option>
            </select>
          </div>
        </div>

        <div class="row2" style="margin-top:12px;">
          <button class="btn btn-primary" id="save">Save</button>
          <button class="btn" id="new">New</button>
          <button class="btn" id="clear">Clear</button>
          <button class="btn btn-danger" id="delete" disabled>Delete</button>
        </div>

        <div class="statusLine" style="margin-top:12px;">
          <strong>Status:</strong> <span id="formStatus" class="muted">Ready.</span>
        </div>

        <div class="muted" style="margin-top:10px;">
          Live Start is enabled only when a device has a saved profile.
        </div>
      </div>

    </div>
  </div>

  <script src="/static/devices.js"></script>
</body>

</html>
