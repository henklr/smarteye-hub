<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Views</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/playback.css" />
  <link rel="stylesheet" href="/static/views.css" />
</head>

<body class="viewsPage livePage" data-views-mode="live">
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <img src="/static/smarteye-light.png" alt="SmartEye" class="topbarLogo">
        <img src="/static/smarteye-dark.png" alt="SmartEye" class="topbarLogoDark">
      </div>
      <div class="topbarCenter">
        <div class="tabs">
          <a class="tab active" href="/views"><span class="tabDot"></span>Views</a>
          <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
          <a class="tab" href="/control"><span class="tabDot"></span>Control</a>
          <a class="tab" href="/flows"><span class="tabDot"></span>Flows</a>
          <a class="tab" href="/settings"><span class="tabDot"></span>System</a>
        </div>
      </div>
      <div class="topbarActions">
        <button class="btn logoutBtn" id="logoutBtn" type="button" title="Sign out">Logout</button>
      </div>
    </div>

    <div class="viewsShell">
      <div class="viewsLayout">
        <aside class="liveSidebar viewsSidebar" id="viewsSidebar">
          <div class="viewsModeSwitch" role="tablist" aria-label="View mode">
            <button class="viewsModeBtn is-active" type="button" data-views-mode-btn="live" role="tab" aria-selected="true">Live</button>
            <a class="viewsModeBtn" href="/playback" role="tab">Playback</a>
          </div>

          <div class="liveSidebarHdr">Cameras</div>
          <div class="liveSidebarList" id="viewsCameraList">
            <div class="liveSidebarEmpty">Loading…</div>
          </div>

          <div class="liveSidebarFooter" data-views-mode-only="live">
            <div class="liveSidebarActions">
              <button class="btn liveSidebarActionBtn" id="sidebarStartAll" type="button">Start All</button>
              <button class="btn liveSidebarActionBtn" id="sidebarStopAll" type="button">Stop All</button>
            </div>
          </div>

          <div class="liveSidebarFooter" data-views-mode-only="playback">
            <div class="liveSidebarActions">
              <button class="btn liveSidebarActionBtn" id="playbackSidebarSelectAll" type="button">Select All</button>
              <button class="btn liveSidebarActionBtn" id="playbackSidebarClearAll" type="button">Clear All</button>
            </div>
          </div>

          <div data-views-mode-only="live">
            <div class="liveSidebarHdr">Speakers</div>
            <div class="liveSidebarList" id="speakerSidebarList">
              <div class="liveSidebarEmpty">Loading…</div>
            </div>
          </div>
        </aside>

        <main class="viewsMain">
          <div class="liveMain viewsModePane" data-views-mode-only="live">
            <div class="videoGrid" id="videoGrid"></div>
          </div>

          <div class="playbackMain viewsModePane" data-views-mode-only="playback">
            <section class="playbackViewerCard">
              <div class="playbackVideoShell" id="playbackVideoShell">
                <div class="videoGrid playbackVideoGrid" id="playbackVideoGrid"></div>
                <div class="playbackVideoEmpty" id="playbackVideoEmpty" data-state="loading" aria-live="polite" aria-busy="true">
                  <div class="playbackVideoEmptyPanel">
                    <div class="playbackVideoEmptyBadge" id="playbackVideoEmptyBadge">Loading</div>
                    <div class="playbackVideoEmptySpinner" aria-hidden="true"></div>
                    <div class="playbackVideoEmptyTitle">Loading playback...</div>
                    <div class="playbackVideoEmptyText" id="playbackVideoEmptyText">Fetching cameras and timeline markers for the selected day.</div>
                  </div>
                </div>
              </div>
            </section>

            <div class="playbackControlsSection">
              <div class="playbackTransport" id="playbackTransport">
                <div class="playbackTransportTimeDisplay" id="playbackTimeDisplay" aria-live="polite">--:--:--</div>

                <div class="playbackTransportButtons">
                  <button class="btn btn-compact playbackTransportButton" id="playbackReplay30Btn" type="button" aria-label="Back 30 seconds" title="Back 30s">
                    <span class="playbackTransportGlyph" aria-hidden="true">«30</span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackReplay5Btn" type="button" aria-label="Back 5 seconds" title="Back 5s">
                    <span class="playbackTransportGlyph" aria-hidden="true">«5</span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackFrameBackBtn" type="button" aria-label="Previous frame" title="Previous frame">
                    <span class="playbackTransportGlyph" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false"><path d="M16 6 L8 12 L16 18 Z"></path><rect x="6" y="6" width="2" height="12" rx="0.5"></rect></svg>
                    </span>
                  </button>
                  <button class="btn btn-primary btn-compact playbackTransportButton" id="playbackPlayPauseBtn" type="button" aria-label="Play" title="Play">
                    <span class="playbackTransportGlyph" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false"><path d="M8 6.5V17.5L17 12L8 6.5Z"></path></svg>
                    </span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackFrameFwdBtn" type="button" aria-label="Next frame" title="Next frame">
                    <span class="playbackTransportGlyph" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false"><path d="M8 6 L16 12 L8 18 Z"></path><rect x="16" y="6" width="2" height="12" rx="0.5"></rect></svg>
                    </span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackFwd5Btn" type="button" aria-label="Forward 5 seconds" title="Forward 5s">
                    <span class="playbackTransportGlyph" aria-hidden="true">5»</span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackFwd30Btn" type="button" aria-label="Forward 30 seconds" title="Forward 30s">
                    <span class="playbackTransportGlyph" aria-hidden="true">30»</span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton playbackLiveBtn" id="playbackLiveBtn" type="button" aria-label="Jump to live" title="Jump to live">
                    <span class="playbackLiveDot" aria-hidden="true"></span>LIVE
                  </button>
                </div>

                <div class="playbackSpeedControl">
                  <label for="playbackSpeedSelect">Speed</label>
                  <select id="playbackSpeedSelect" aria-label="Playback speed">
                    <option value="0.25">0.25x</option>
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                    <option value="8">8x</option>
                    <option value="16">16x</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      <section class="playbackTimelineCard" data-views-mode-only="playback">
        <div class="playbackTimelineProgress" id="playbackTimelineProgress" data-active="false" aria-hidden="true">
          <div class="playbackTimelineProgressBar"></div>
        </div>
        <div class="playbackTimelineWrap">
          <div class="playbackTimelineToolbar">
            <div class="playbackTimelineFilters" id="playbackTimelineFilters"></div>
            <div class="playbackTimelineSelectors">
              <div class="playbackTimelineDateNav">
                <button class="btn btn-compact playbackTimelineNavBtn" id="playbackPrevDayBtn" type="button" title="Previous day" aria-label="Previous day">‹</button>
                <input id="playbackDayInput" type="date" />
                <button class="btn btn-compact playbackTimelineNavBtn" id="playbackNextDayBtn" type="button" title="Next day" aria-label="Next day">›</button>
                <button class="btn btn-compact playbackTimelineTodayBtn" id="playbackTodayBtn" type="button" title="Jump to now">Today</button>
              </div>
              <div class="playbackTimelineZoomPresets" id="playbackZoomPresets" role="tablist" aria-label="Timeline zoom">
                <button class="playbackZoomBtn" type="button" data-zoom-ms="300000">5m</button>
                <button class="playbackZoomBtn is-active" type="button" data-zoom-ms="3600000">1h</button>
                <button class="playbackZoomBtn" type="button" data-zoom-ms="21600000">6h</button>
                <button class="playbackZoomBtn" type="button" data-zoom-ms="86400000">24h</button>
                <button class="playbackZoomBtn" type="button" data-zoom-ms="604800000">7d</button>
              </div>
            </div>
          </div>
          <div class="playbackTimelineScale" id="playbackTimelineScale"></div>
          <div class="playbackTimelineTrack" id="playbackTimelineTrack">
            <div class="playbackThumbPreview hidden" id="playbackThumbPreview" aria-hidden="true">
              <img id="playbackThumbPreviewImg" alt="" />
              <div class="playbackThumbPreviewLabel" id="playbackThumbPreviewLabel"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="/static/event-notify.js"></script>
  <script src="/static/views.js"></script>
  <script src="/static/views-live.js"></script>
</body>

</html>
