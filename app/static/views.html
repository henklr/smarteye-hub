<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Views</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/playback.css" />
  <link rel="stylesheet" href="/static/views.css" />
</head>

<body class="viewsPage livePage" data-views-mode="live">
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <img src="/static/smarteye-light.png" alt="SmartEye" class="topbarLogo">
        <img src="/static/smarteye-dark.png" alt="SmartEye" class="topbarLogoDark">
      </div>
      <div class="topbarCenter">
        <div class="tabs">
          <a class="tab active" href="/views"><span class="tabDot"></span>Views</a>
          <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
          <a class="tab" href="/flows"><span class="tabDot"></span>Flows</a>
          <a class="tab" href="/settings"><span class="tabDot"></span>System</a>
        </div>
      </div>
      <div class="topbarActions">
        <button class="btn logoutBtn" id="logoutBtn" type="button" title="Sign out">Logout</button>
      </div>
    </div>

    <div class="viewsShell">
      <div class="viewsLayout">
        <aside class="liveSidebar viewsSidebar" id="viewsSidebar">
          <div class="viewsModeSwitch" role="tablist" aria-label="View mode">
            <button class="viewsModeBtn is-active" type="button" data-views-mode-btn="live" role="tab" aria-selected="true">Live</button>
            <button class="viewsModeBtn" type="button" data-views-mode-btn="playback" role="tab" aria-selected="false">Playback</button>
          </div>

          <div class="liveSidebarHdr">Cameras</div>
          <div class="liveSidebarList" id="viewsCameraList">
            <div class="liveSidebarEmpty">Loading…</div>
          </div>

          <div class="liveSidebarFooter" data-views-mode-only="live">
            <div class="liveSidebarActions">
              <button class="btn liveSidebarActionBtn" id="sidebarStartAll" type="button">Start All</button>
              <button class="btn liveSidebarActionBtn" id="sidebarStopAll" type="button">Stop All</button>
            </div>
          </div>

          <div class="liveSidebarFooter" data-views-mode-only="playback">
            <div class="liveSidebarActions">
              <button class="btn liveSidebarActionBtn" id="playbackSidebarSelectAll" type="button">Select All</button>
              <button class="btn liveSidebarActionBtn" id="playbackSidebarClearAll" type="button">Clear All</button>
            </div>
          </div>

          <div data-views-mode-only="live">
            <div class="liveSidebarHdr">Speakers</div>
            <div class="liveSidebarList" id="speakerSidebarList">
              <div class="liveSidebarEmpty">Loading…</div>
            </div>
          </div>
        </aside>

        <main class="viewsMain">
          <div class="liveMain viewsModePane" data-views-mode-only="live">
            <div class="videoGrid" id="videoGrid"></div>
          </div>

          <div class="playbackMain viewsModePane" data-views-mode-only="playback">
            <section class="playbackViewerCard">
              <div class="playbackVideoShell" id="playbackVideoShell">
                <div class="videoGrid playbackVideoGrid" id="playbackVideoGrid"></div>
                <div class="playbackVideoEmpty" id="playbackVideoEmpty" data-state="loading" aria-live="polite" aria-busy="true">
                  <div class="playbackVideoEmptyPanel">
                    <div class="playbackVideoEmptyBadge" id="playbackVideoEmptyBadge">Loading</div>
                    <div class="playbackVideoEmptySpinner" aria-hidden="true"></div>
                    <div class="playbackVideoEmptyTitle">Loading playback...</div>
                    <div class="playbackVideoEmptyText" id="playbackVideoEmptyText">Fetching cameras and timeline markers for the selected day.</div>
                  </div>
                </div>
              </div>
            </section>

            <div class="playbackControlsSection">
              <div class="playbackTransport" id="playbackTransport">
                <div class="playbackTransportButtons">
                  <button class="btn btn-primary btn-compact playbackTransportButton" id="playbackPlayPauseBtn" type="button" aria-label="Play" title="Play">
                    <span class="playbackTransportGlyph" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M8 6.5V17.5L17 12L8 6.5Z"></path>
                      </svg>
                    </span>
                  </button>
                  <button class="btn btn-compact playbackTransportButton" id="playbackStopBtn" type="button" aria-label="Stop" title="Stop">
                    <span class="playbackTransportGlyph" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false">
                        <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
                      </svg>
                    </span>
                  </button>
                </div>

                <div class="playbackSpeedControl playbackShuttleControl">
                  <div class="playbackShuttleBar">
                    <div class="playbackShuttleTrackBg" aria-hidden="true">
                      <span class="playbackShuttleTrackFill" data-shuttle-fill></span>
                      <span class="playbackShuttleDetent" data-pos="neg-one"></span>
                      <span class="playbackShuttleDetent" data-pos="center"></span>
                      <span class="playbackShuttleDetent" data-pos="rest"></span>
                      <output id="playbackShuttleValue" class="playbackShuttleValue" for="playbackShuttleInput" data-shuttle-value>1x</output>
                    </div>
                    <input id="playbackShuttleInput" type="range" min="-1" max="1" step="0.002" value="0.25" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      <section class="playbackTimelineCard" data-views-mode-only="playback">
        <div class="playbackTimelineWrap">
          <div class="playbackTimelineToolbar">
            <div class="playbackTimelineFilters" id="playbackTimelineFilters"></div>
            <div class="playbackTimelineSelectors">
              <div class="playbackTimelineSelector">
                <label for="playbackDayInput">Day</label>
                <input id="playbackDayInput" type="date" />
              </div>
            </div>
          </div>
          <div class="playbackTimelineScale" id="playbackTimelineScale"></div>
          <div class="playbackTimelineTrack" id="playbackTimelineTrack"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="/static/event-notify.js"></script>
  <script src="/static/vendor/hls.min.js"></script>
  <script src="/static/views.js"></script>
  <script src="/static/views-live.js"></script>
  <script src="/static/views-playback.js"></script>
</body>

</html>
