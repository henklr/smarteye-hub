<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>SmartEye Intelligence</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <header>
    <div class="wrap">
      <div>
        <h1>Home</h1>
      </div>
      <div class="nav">
        <a href="/automations.html">Automations</a>
        <a href="/scenes.html">Scenes</a>
        <a href="/settings.html">Settings</a>
      </div>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="cardHeader">
        <div>
          <h1>SmartEye Intelligence</h1>
          <div class="subtitle">Browse recent events from <span class="code">/api/events</span></div>
        </div>
        <div class="row">
          <button id="btnLoad">Load events</button>
          <button id="btnAuto" class="secondary">Auto-refresh: Off</button>
        </div>
      </div>

      <div class="section">
        <div class="sectionTitle">Filters</div>

        <div class="miniRow3">
          <div>
            <label for="eventType">Event type</label>
            <select id="eventType">
              <option value="">(any)</option>
              <option value="alarm">alarm</option>
              <option value="analysis">analysis</option>
            </select>
          </div>

          <div>
            <label for="cameraIp">Camera IP</label>
            <input id="cameraIp" type="text" placeholder="e.g. 172.16.0.100" />
          </div>

          <div>
            <label for="code">Code</label>
            <input id="code" type="text" placeholder="e.g. FaceDetection" />
          </div>
        </div>

        <div class="miniRow3">
          <div>
            <label for="action">Action</label>
            <select id="action">
              <option value="">(any)</option>
              <option value="Start">Start</option>
              <option value="Stop">Stop</option>
            </select>
          </div>

          <div>
            <label for="ok">Ok</label>
            <select id="ok">
              <option value="">(any)</option>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>

          <div>
            <label for="limit">Limit</label>
            <input id="limit" type="number" min="1" max="5000" value="50" />
          </div>
        </div>

        <div class="miniRow">
          <div>
            <label for="since">Since</label>
            <input id="since" type="text" placeholder="e.g. 2026-01-21T10:50:00Z or 2026-01-21 11:50:00" />
          </div>
          <div>
            <label for="until">Until</label>
            <input id="until" type="text" placeholder="optional" />
          </div>
        </div>

        <div>
          <label for="fields">Fields (comma-separated)</label>
          <input id="fields" type="text"
            value="id,event_type,timestamp,camera_ip,code,action,event_seq,locale_time,ok,error,snapshot_count,analysis.category,analysis.reason" />
          <div class="hint">
            Tip: supports dot paths like <span class="code">analysis.category</span> and <span
              class="code">raw.Data.EventSeq</span>.
            Leave empty to return the full event object.
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="title">Events</div>
            <div class="subtitle" id="meta">No data loaded yet.</div>
          </div>
        </div>

        <div class="items" id="eventsList"></div>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const els = {
      btnLoad: $("btnLoad"),
      btnAuto: $("btnAuto"),
      status: $("status"),
      meta: $("meta"),
      eventsList: $("eventsList"),

      eventType: $("eventType"),
      cameraIp: $("cameraIp"),
      code: $("code"),
      action: $("action"),
      ok: $("ok"),
      since: $("since"),
      until: $("until"),
      limit: $("limit"),
      fields: $("fields"),
    };

    let autoTimer = null;
    let autoOn = false;

    const openDetails = new Set(); // event ids that are currently expanded

    function setStatus(kind, msg) {
      els.status.className = "status " + (kind === "ok" ? "ok" : "err");
      els.status.textContent = msg;
    }

    function clearStatus() {
      els.status.className = "status";
      els.status.textContent = "";
    }

    function captureOpenDetails() {
      openDetails.clear();
      document.querySelectorAll('details[data-event-id]').forEach(d => {
        if (d.open) openDetails.add(d.dataset.eventId);
      });
    }

    function buildQuery() {
      const params = new URLSearchParams();

      const add = (k, v) => {
        if (v === null || v === undefined) return;
        if (typeof v === "string" && v.trim() === "") return;
        params.set(k, v);
      };

      add("event_type", els.eventType.value);
      add("camera_ip", els.cameraIp.value);
      add("code", els.code.value);
      add("action", els.action.value);
      add("ok", els.ok.value);
      add("since", els.since.value);
      add("until", els.until.value);
      add("limit", els.limit.value);

      // fields can be empty -> endpoint returns full object
      add("fields", els.fields.value);

      return params.toString();
    }

    function safeText(v) {
      if (v === null || v === undefined) return "";
      return String(v);
    }

    function pill(text) {
      const span = document.createElement("span");
      span.className = "pill";
      span.textContent = text;
      return span;
    }

    function codeSpan(text) {
      const span = document.createElement("span");
      span.className = "code";
      span.textContent = text;
      return span;
    }

    function renderEvents(payload) {
      captureOpenDetails();
      els.eventsList.innerHTML = "";

      const returned = payload.returned ?? 0;
      const scanned = payload.scanned ?? 0;
      const path = payload.path ?? "";
      els.meta.textContent = `Showing ${returned} event(s) (scanned ${scanned}). Source: ${path}`;

      const events = payload.events || [];
      if (!events.length) {
        const empty = document.createElement("div");
        empty.className = "item";
        empty.textContent = "No events matched your filters.";
        els.eventsList.appendChild(empty);
        return;
      }

      for (const ev of events) {
        const item = document.createElement("div");
        item.className = "item";

        const header = document.createElement("div");
        header.className = "itemHeader";

        const left = document.createElement("div");
        const right = document.createElement("div");

        const title = document.createElement("strong");
        title.textContent = safeText(ev.event_type || "(event)");

        left.appendChild(title);

        // Small line of pills
        const pillsRow = document.createElement("div");
        if (ev.timestamp) pillsRow.appendChild(pill(safeText(ev.timestamp)));
        if (ev.camera_ip) pillsRow.appendChild(pill("cam " + safeText(ev.camera_ip)));
        if (ev.code) pillsRow.appendChild(pill(safeText(ev.code)));
        if (ev.action) pillsRow.appendChild(pill(safeText(ev.action)));
        if (typeof ev.ok === "boolean") pillsRow.appendChild(pill("ok=" + ev.ok));
        if (ev.scene_id) pillsRow.appendChild(pill("scene " + safeText(ev.scene_id)));
        if (ev.parent_event_id) pillsRow.appendChild(pill("parent " + safeText(ev.parent_event_id)));
        left.appendChild(pillsRow);

        // Right side: id
        if (ev.id) {
          right.appendChild(codeSpan(safeText(ev.id)));
        }

        header.appendChild(left);
        header.appendChild(right);
        item.appendChild(header);

        // Optional "summary" line for analysis
        const summary = document.createElement("div");
        summary.className = "subtitle";
        const parts = [];

        if (ev.event_seq !== undefined && ev.event_seq !== null) parts.push("seq " + ev.event_seq);
        if (ev.locale_time) parts.push("local " + ev.locale_time);
        if (ev.snapshot_count !== undefined && ev.snapshot_count !== null) parts.push("snapshots " + ev.snapshot_count);
        if (ev.error) parts.push("error: " + ev.error);
        if (ev["analysis.category"]) parts.push("category: " + ev["analysis.category"]);
        if (ev["analysis.reason"]) parts.push(ev["analysis.reason"]);

        // If fields were empty (full object), analysis might be nested:
        if (!ev["analysis.category"] && ev.analysis && ev.analysis.category) parts.push("category: " + ev.analysis.category);
        if (!ev["analysis.reason"] && ev.analysis && ev.analysis.reason) parts.push(ev.analysis.reason);

        summary.textContent = parts.filter(Boolean).join(" • ");
        if (summary.textContent.trim().length > 0) item.appendChild(summary);

        // Expandable JSON
        const details = document.createElement("details");
        details.style.marginTop = "10px";

        const eid = ev.id ? String(ev.id) : "";
        if (eid) {
          details.dataset.eventId = eid;
          if (openDetails.has(eid)) details.open = true; // restore state
        }

        const summaryEl = document.createElement("summary");
        summaryEl.textContent = "Show raw JSON";
        summaryEl.style.cursor = "pointer";
        summaryEl.style.color = "rgba(255,255,255,0.82)";
        summaryEl.style.fontWeight = "800";
        summaryEl.style.fontSize = "12px";

        // keep Set in sync when user opens/closes
        details.addEventListener("toggle", () => {
          if (!eid) return;
          if (details.open) openDetails.add(eid);
          else openDetails.delete(eid);
        });

        const pre = document.createElement("pre");
        pre.className = "editor";
        pre.style.height = "auto";
        pre.style.minHeight = "0";
        pre.style.marginTop = "10px";
        pre.textContent = JSON.stringify(ev, null, 2);

        details.appendChild(summaryEl);
        details.appendChild(pre);
        item.appendChild(details);

        els.eventsList.appendChild(item);
      }
    }

    async function loadEvents() {
      clearStatus();
      els.btnLoad.disabled = true;

      try {
        const qs = buildQuery();
        const url = "/api/events" + (qs ? ("?" + qs) : "");
        const res = await fetch(url);

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text}`);
        }

        const payload = await res.json();
        if (!payload.ok) {
          throw new Error(payload.detail || "Request failed");
        }

        renderEvents(payload);
        setStatus("ok", "Loaded events successfully.");
      } catch (err) {
        console.error(err);
        setStatus("err", "Failed to load events: " + (err?.message || err));
      } finally {
        els.btnLoad.disabled = false;
      }
    }

    function toggleAuto() {
      autoOn = !autoOn;
      els.btnAuto.textContent = "Auto-refresh: " + (autoOn ? "On" : "Off");
      els.btnAuto.className = autoOn ? "" : "secondary";

      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
      if (autoOn) {
        autoTimer = setInterval(loadEvents, 5000);
        loadEvents();
      }
    }

    els.btnLoad.addEventListener("click", loadEvents);
    els.btnAuto.addEventListener("click", toggleAuto);

    // Load once on first visit
    loadEvents();
  </script>
</body>

</html>
