<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Intelligence Settings</title>
</head>

<body>
  <header>
    <div class="wrap">
      <div>
        <h1>Settings</h1>
      </div>
      <div class="nav">
        <a href="/">Home</a>
        <a href="/automations.html">Automations</a>
        <a href="/scenes.html">Scenes</a>
      </div>
    </div>
  </header>

  <main>
    <div class="row">
      <button id="saveBtn">Save Settings</button>
      <button class="secondary" id="restartAlarmBtn">Restart Alarm Listener</button>
    </div>

    <div id="status" class="status"></div>

    <div id="grid" class="grid">

      <div class="card">
        <div class="title">Alarm Listener</div>

        <div class="row">
          <input type="checkbox" id="log_raw_payload">
          <label for="log_raw_payload">Log raw payload</label>
        </div>

        <label for="listen_host">Listen Host</label>
        <input type="text" id="listen_host" placeholder="0.0.0.0">

        <label for="listen_port">Listen Port</label>
        <input type="number" id="listen_port" min="1" max="65535" placeholder="15000">
      </div>
      <div class="card">
        <div class="title">Upload Cleanup</div>

        <div class="row">
          <input type="checkbox" id="upload_cleanup_enabled">
          <label for="upload_cleanup_enabled">Enable upload cleanup</label>
        </div>

        <label for="upload_max_total_mb">Max total size (MB)</label>
        <input type="number" id="upload_max_total_mb" min="1" step="1">

        <label for="upload_min_file_age_seconds">Min file age before deletion (seconds)</label>
        <input type="number" id="upload_min_file_age_seconds" min="0" step="1">

        <label for="upload_interval_seconds">Cleanup interval (seconds)</label>
        <input type="number" id="upload_interval_seconds" min="5" step="1">

        <div class="row">
          <input type="checkbox" id="upload_delete_empty_dirs">
          <label for="upload_delete_empty_dirs">Delete empty folders</label>
        </div>
      </div>
      <div class="card">
        <div class="title">Time</div>

        <label for="time_timezone">Timezone (IANA name)</label>
        <input type="text" id="time_timezone" placeholder="Europe/Copenhagen" spellcheck="false" autocomplete="off" />

        <div class="hint">
          Examples: <code>Europe/Copenhagen</code>, <code>UTC</code>, <code>America/New_York</code>
        </div>
      </div>


    </div>


  </main>

  <script type="module" src="/scripts/settings.js"></script>
</body>

</html>
