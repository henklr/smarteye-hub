<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; }
    h1 { margin-bottom: 0; }
    p { color: #444; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-top: 16px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 6px;
    }
    input[type="checkbox"] { transform: scale(1.2); margin-right: 8px; }
    button {
      margin-top: 16px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
    .status { margin-top: 16px; padding: 10px; border-radius: 10px; display: none; }
    .status.ok { background: #e8fff0; border: 1px solid #95e2b0; display: block; }
    .status.err { background: #ffecec; border: 1px solid #ff9b9b; display: block; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
    .topnav { margin-top: 8px; }
    .topnav a { color: #000; text-decoration: none; }
    .topnav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <div class="topnav">
    <a href="/">← Back to site</a>
  </div>
  <p>Edit <code>data/settings.json</code> using this UI.</p>

  <div class="card">
    <h2>Alarm Listener</h2>

    <div class="row">
      <input type="checkbox" id="only_start_events">
      <label for="only_start_events" style="margin:0;">Only log <b>Action=Start</b> events</label>
    </div>

    <div class="row">
      <input type="checkbox" id="log_raw_payload">
      <label for="log_raw_payload" style="margin:0;">Log raw payload</label>
    </div>

    <label for="listen_host">Listen Host</label>
    <input type="text" id="listen_host" placeholder="0.0.0.0">

    <label for="listen_port">Listen Port</label>
    <input type="number" id="listen_port" min="1" max="65535" placeholder="15000">

    <div class="row" style="margin-top: 16px;">
        <button id="saveBtn">Save Settings</button>
        <button id="restartAlarmBtn" style="background:#444;">Restart Alarm Listener</button>
    </div>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const saveBtn = document.getElementById("saveBtn");

    function setStatusOk(msg) {
      statusEl.textContent = msg;
      statusEl.className = "status ok";
    }
    function setStatusErr(msg) {
      statusEl.textContent = msg;
      statusEl.className = "status err";
    }

    async function loadSettings() {
      try {
        const res = await fetch("/api/settings");
        if (!res.ok) throw new Error("Failed to load settings");
        const settings = await res.json();

        const al = settings.alarm_listener || {};
        document.getElementById("only_start_events").checked = !!al.only_start_events;
        document.getElementById("log_raw_payload").checked = !!al.log_raw_payload;
        document.getElementById("listen_host").value = al.listen_host ?? "0.0.0.0";
        document.getElementById("listen_port").value = al.listen_port ?? 15000;

        setStatusOk("Settings loaded.");
      } catch (e) {
        setStatusErr("Error: " + e.message);
      }
    }

    async function saveSettings() {
      saveBtn.disabled = true;
      try {
        const payload = {
          alarm_listener: {
            only_start_events: document.getElementById("only_start_events").checked,
            log_raw_payload: document.getElementById("log_raw_payload").checked,
            listen_host: document.getElementById("listen_host").value.trim(),
            listen_port: parseInt(document.getElementById("listen_port").value, 10)
          }
        };

        const res = await fetch("/api/settings", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text();
          throw new Error("Save failed: " + txt);
        }

        setStatusOk("Saved! ✅ Restart container for listener port/host changes to take effect.");
      } catch (e) {
        setStatusErr("Error: " + e.message);
      } finally {
        saveBtn.disabled = false;
      }
    }

    saveBtn.addEventListener("click", saveSettings);

    const restartAlarmBtn = document.getElementById("restartAlarmBtn");

    async function restartAlarm() {
    restartAlarmBtn.disabled = true;
    try {
        const res = await fetch("/api/alarm/restart", { method: "POST" });
        if (!res.ok) {
        const txt = await res.text();
        throw new Error("Restart failed: " + txt);
        }
        setStatusOk("Alarm listener restarted ✅");
        } catch (e) {
            setStatusErr("Error: " + e.message);
        } finally {
            restartAlarmBtn.disabled = false;
        }
    }

    restartAlarmBtn.addEventListener("click", restartAlarm);

    loadSettings();
  </script>
</body>
</html>
