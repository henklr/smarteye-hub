<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Intelligence Settings</title>
</head>

<body>
  <header>
    <div class="wrap">
      <div>
        <h1>Settings</h1>
      </div>
      <div class="nav">
        <a href="/">Home</a>
        <a href="/automations.html">Automations</a>
        <a href="/scenes.html">Scenes</a>
      </div>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>Alarm Listener</h2>

      <div class="row">
        <input type="checkbox" id="only_start_events">
        <label for="only_start_events" style="margin:0;">Only log <b>Action=Start</b> events</label>
      </div>

      <div class="row">
        <input type="checkbox" id="log_raw_payload">
        <label for="log_raw_payload" style="margin:0;">Log raw payload</label>
      </div>

      <label for="listen_host">Listen Host</label>
      <input type="text" id="listen_host" placeholder="0.0.0.0">

      <label for="listen_port">Listen Port</label>
      <input type="number" id="listen_port" min="1" max="65535" placeholder="15000">

      <div class="row" style="margin-top: 16px;">
        <button id="saveBtn">Save Settings</button>
        <button id="restartAlarmBtn" style="background:#444;">Restart Alarm Listener</button>
      </div>

      <div id="status" class="status"></div>
    </div>
    <div class="card">
      <h2>Upload Cleanup</h2>

      <div class="row">
        <input type="checkbox" id="upload_cleanup_enabled">
        <label for="upload_cleanup_enabled" style="margin:0;">Enable upload cleanup</label>
      </div>

      <label for="upload_max_total_mb">Max total size (MB)</label>
      <input type="number" id="upload_max_total_mb" min="1" step="1">

      <label for="upload_min_file_age_seconds">Min file age before deletion (seconds)</label>
      <input type="number" id="upload_min_file_age_seconds" min="0" step="1">

      <label for="upload_interval_seconds">Cleanup interval (seconds)</label>
      <input type="number" id="upload_interval_seconds" min="5" step="1">

      <div class="row">
        <input type="checkbox" id="upload_delete_empty_dirs">
        <label for="upload_delete_empty_dirs" style="margin:0;">Delete empty folders</label>
      </div>
    </div>

  </main>

  <script type="module" src="/scripts/settings.js"></script>
</body>

</html>
