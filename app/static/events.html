<!-- events.html -->
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Events</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
    }

    .grow {
      flex: 1 1 220px;
    }

    .list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .eventCard {
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .03);
      border-radius: 12px;
      padding: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .title {
      font-weight: 900;
    }

    .mini {
      font-size: 11px;
      color: var(--muted);
    }

    .tagRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .04);
      font-size: 11px;
      font-weight: 800;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--stroke);
      background: rgba(0, 0, 0, .18);
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
    }

    .empty {
      padding: 10px 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .topbarLeft {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbarRight {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
  </style>
</head>

<body>
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <div class="tabs">
          <a class="tab" href="/"><span class="tabDot"></span>Home</a>
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
          <a class="tab" href="/actions"><span class="tabDot"></span>Actions</a>
          <a class="tab active" href="/events"><span class="tabDot"></span>Events</a>
          <a class="tab" href="/playback"><span class="tabDot"></span>Playback</a>
        </div>
      </div>

      <div class="topbarRight">
        <button class="btn" id="btnRefresh" type="button">Refresh</button>
      </div>
    </div>

    <section class="card">
      <div class="listHeader">
        <div>
          <div class="listTitle">Action events</div>
          <div class="listSub">Events generated by saved Actions rules.</div>
        </div>
      </div>

      <div class="toolbar" style="margin-top:12px;">
        <div class="grow">
          <label for="deviceFilter">Device</label>
          <select id="deviceFilter"></select>
        </div>
        <div class="grow">
          <label for="searchInput">Search</label>
          <input id="searchInput" placeholder="Rule name, device, message, topic..." />
        </div>
      </div>

      <div id="list" class="list"></div>
    </section>
  </div>

  <script src="/static/events.js"></script>
</body>

</html>
