<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Events</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/events.css" />
</head>

<body class="eventsPage">
  <div class="wrap full">
    <div class="topbar">
      <div class="topbarLeft">
        <img src="/static/smarteye-light.png" alt="SmartEye" class="topbarLogo">
        <img src="/static/smarteye-dark.png" alt="SmartEye" class="topbarLogoDark">
      </div>
      <div class="topbarCenter">
        <div class="tabs">
          <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab" href="/playback"><span class="tabDot"></span>Playback</a>
          <a class="tab active" href="/events"><span class="tabDot"></span>Events</a>
          <a class="tab" href="/flows"><span class="tabDot"></span>Flows</a>
          <a class="tab" href="/settings"><span class="tabDot"></span>System</a>
        </div>
      </div>
      <div class="topbarActions">
        <button class="btn logoutBtn" id="logoutBtn" type="button" title="Sign out">Logout</button>
      </div>
    </div>

    <div class="eventsShell">
      <div class="eventsContent">

        <section class="eventsCard">
          <div class="listHeader compact eventsHeader">
            <div>
              <div class="listTitle small">Events</div>
              <div class="listSub" id="eventsHeaderSub">Overview of site events generated by flows.</div>
            </div>
            <div class="eventsHeaderActions">
              <button class="btn" id="btnAcknowledgeAll" type="button">Acknowledge all</button>
              <button class="btn btn-danger" id="btnClearAll" type="button">Clear all</button>
            </div>
          </div>

          <div class="eventsListWrap">
            <div class="eventsList" id="eventsList">
              <div class="eventsEmpty" id="eventsEmpty">
                <div class="eventsEmptyText">No events yet.</div>
                <div class="eventsEmptyHint">Events will appear here when generated by a flow using the Generate event node.</div>
              </div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </div>

  <!-- snapshot lightbox -->
  <div class="eventsLightbox hidden" id="eventsLightbox" aria-hidden="true">
    <div class="eventsLightboxBackdrop" id="eventsLightboxBackdrop"></div>
    <div class="eventsLightboxContent">
      <img class="eventsLightboxImg" id="eventsLightboxImg" alt="Snapshot" />
      <button class="btn eventsLightboxClose" id="eventsLightboxClose" type="button">Close</button>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="/static/events.js"></script>
</body>

</html>
