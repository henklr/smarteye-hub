<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Actions</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body class="actionsPage">
  <div class="wrap full">
    <div class="topbar">
      <div class="tabs">
        <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
        <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
        <a class="tab active" href="/actions"><span class="tabDot"></span>Actions</a>
        <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
      </div>
    </div>

    <div class="split">
      <div class="card">
        <div class="listHeader">
          <div>
            <div class="listTitle">Saved rules</div>
            <div class="listSub">Click a rule to edit it, or create a new one.</div>
          </div>
          <button class="btn btn-primary" id="btnNew" type="button">New rule</button>
        </div>

        <div class="rulesTools">
          <div class="grow">
            <label for="rulesSearch">Search</label>
            <input id="rulesSearch" placeholder="Search by name, trigger, action or device" />
          </div>

          <div class="ruleFilterWrap">
            <label for="rulesFilterStatus">Status</label>
            <select id="rulesFilterStatus">
              <option value="all">All rules</option>
              <option value="enabled">Enabled only</option>
              <option value="disabled">Disabled only</option>
            </select>
          </div>
        </div>

        <div id="rulesList" class="rulesList"></div>

        <div class="statusLine">
          <strong>Status:</strong> <span id="listStatus" class="muted">Ready.</span>
        </div>
      </div>

      <div class="card">
        <div class="formTitle" id="formTitle">New rule</div>

        <div class="grid ruleHeaderGrid">
          <div data-full>
            <label for="ruleName">Rule name</label>
            <input id="ruleName" placeholder="Front door motion log event" />
          </div>

          <div data-full>
            <label for="ruleEnabled">Status</label>
            <label class="enableRow m-0">
              <input id="ruleEnabled" type="checkbox" checked />
              <span id="ruleEnabledText">Enabled</span>
            </label>
          </div>
        </div>

        <div class="collapseCard mt-12">
          <div class="sectionHead">
            <div>
              <div class="collapseHeadTitle">Triggers</div>
              <div class="collapseHeadSub">A rule runs when any trigger matches.</div>
            </div>
          </div>
          <div class="collapseBody open" id="triggersBody">
            <div class="row2 mt-0">
              <button class="btn" id="btnAddCondition" type="button">Add trigger</button>
            </div>
            <div id="conditionsList" class="itemList mt-10"></div>
          </div>
        </div>

        <div class="collapseCard mt-12">
          <div class="sectionHead">
            <div>
              <div class="collapseHeadTitle">Actions</div>
              <div class="collapseHeadSub">Choose what happens when a trigger matches.</div>
            </div>
          </div>
          <div class="collapseBody open" id="actionsBody">
            <div class="row2 mt-0">
              <button class="btn" id="btnAddAction" type="button">Add action</button>
            </div>
            <div id="actionsList" class="itemList mt-10"></div>
          </div>
        </div>

        <div class="formSticky">
          <div class="formStickyInner">
            <div class="rowSplit">
              <div class="muted" id="editorModeText">Create a new rule.</div>

              <div class="row2 mt-0">
                <button class="btn" id="btnDuplicate" type="button">Duplicate</button>
                <button class="btn btn-danger" id="btnDelete" type="button">Delete</button>
                <button class="btn btn-primary" id="btnSave" type="button">Save</button>
              </div>
            </div>
            <div class="statusLine">
              <strong>Status:</strong> <span id="formStatus" class="muted">Ready.</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template id="conditionTemplate">
    <div class="itemCard conditionCard">
      <div class="itemCollapseBtn open" role="button" tabindex="0" aria-expanded="true">
        <div>
          <div class="itemTitle"></div>
          <div class="collapseHeadSub">Trigger details</div>
        </div>

        <div class="itemHeadActions">
          <button class="btn btn-danger btnRemoveCondition" type="button">Remove</button>
          <span class="itemChevron">›</span>
        </div>
      </div>

      <div class="itemCollapseBody open">
        <div class="grid itemGrid">
          <div data-full>
            <label>Trigger name</label>
            <input class="condName" placeholder="Optional label, e.g. Front door motion" />
          </div>
          <div data-full>
            <label>Trigger type</label>
            <select class="condType">
              <option value="onvif_event">ONVIF event</option>
              <option value="device_offline">Device offline</option>
              <option value="device_back_online">Device back online</option>
            </select>
          </div>

          <div data-full>
            <label>Device</label>
            <select class="condDevice"></select>
          </div>
        </div>

        <div class="topicPicker">
          <div class="topicTools">
            <div class="grow">
              <label>Filter topics</label>
              <input class="topicSearch" placeholder="Filter by name or path" />
            </div>
            <div class="topicRefreshWrap">
              <label>&nbsp;</label>
              <button class="btn btnLoadTopics w-full" type="button">Refresh topics</button>
            </div>
          </div>

          <div class="topicSelected selectedTopicText">Select an ONVIF topic to trigger this rule.</div>
          <div class="muted topicCountText mt-8">No topics loaded yet.</div>
          <div class="topicList"></div>
        </div>

        <div class="itemPreview previewText"></div>
        <div class="errorText validationText hidden"></div>
      </div>
    </div>
  </template>

  <template id="actionTemplate">
    <div class="itemCard actionCard">
      <div class="itemCollapseBtn open" role="button" tabindex="0" aria-expanded="true">
        <div>
          <div class="itemTitle"></div>
          <div class="collapseHeadSub">Action details</div>
        </div>

        <div class="itemHeadActions">
          <button class="btn btn-danger btnRemoveAction" type="button">Remove</button>
          <span class="itemChevron">›</span>
        </div>
      </div>

      <div class="itemCollapseBody open">
        <div class="grid itemGrid">
          <div data-full>
            <label>Action name</label>
            <input class="actionName" placeholder="Optional label, e.g. Create front door log event" />
          </div>
          <div data-full>
            <label>Action type</label>
            <select class="actionType">
              <option value="create_log_event">Create log event</option>
            </select>
          </div>
        </div>

        <div class="itemPreview previewText"></div>
        <div class="errorText validationText hidden"></div>
      </div>
    </div>
  </template>

  <script src="/static/actions.js"></script>
</body>
</html>
