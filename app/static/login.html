<!doctype html>
<html lang="en">
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:light)');function a(){var t=localStorage.getItem('theme')||'dark';d.setAttribute('data-theme',t==='system'?(m.matches?'light':'dark'):t)}a();m.addEventListener('change',a)})()</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — SmartEye Hub</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    body { overflow: hidden; margin: 0; }

    /* ── Full-screen eye background ── */
    .loginScene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eyeBg {
      position: absolute;
      width: min(90vmin, 700px);
      height: min(90vmin, 700px);
      opacity: 0.18;
      filter: blur(2px) saturate(1.2);
      animation: breathe 8s ease-in-out infinite alternate;
      pointer-events: none;
      user-select: none;
    }

    @keyframes breathe {
      0%   { opacity: 0.14; transform: scale(1); }
      100% { opacity: 0.22; transform: scale(1.04); }
    }

    /* ── Concentric ring decorations ── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(212,170,79,0.06);
      pointer-events: none;
    }
    .ring--1 { width: 520px; height: 520px; animation: spin 60s linear infinite; }
    .ring--2 { width: 380px; height: 380px; border-style: dashed; animation: spin 45s linear infinite reverse; }
    .ring--3 { width: 240px; height: 240px; border-color: rgba(212,170,79,0.09); animation: spin 30s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content layer ── */
    .loginOverlay {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Wordmark ── */
    .loginWordmark {
      height: 22px;
      margin-bottom: 6px;
      opacity: 0.88;
    }

    .loginTagline {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(212,170,79,0.5);
      margin-bottom: 40px;
    }

    /* ── Glass form card ── */
    .glassCard {
      width: min(320px, calc(100vw - 32px));
      padding: 32px 28px 26px;
      border-radius: 20px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 16px 48px rgba(0,0,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    /* ── Input rows ── */
    .fieldRow {
      position: relative;
      margin-bottom: 20px;
    }

    .fieldRow input {
      width: 100%;
      padding: 14px 16px 6px;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    .fieldRow input:focus {
      border-bottom-color: var(--accent);
    }

    .fieldRow label {
      position: absolute;
      left: 16px;
      top: 10px;
      font-size: 13px;
      color: var(--muted);
      pointer-events: none;
      transition: all 0.2s ease;
    }

    .fieldRow input:focus + label,
    .fieldRow input:not(:placeholder-shown) + label {
      top: -2px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Button ── */
    .loginBtn {
      width: 100%;
      padding: 13px;
      border: 1px solid rgba(212,170,79,0.3);
      border-radius: 12px;
      background: rgba(212,170,79,0.08);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.25s;
    }

    .loginBtn:hover {
      background: rgba(212,170,79,0.16);
      border-color: rgba(212,170,79,0.5);
      box-shadow: 0 0 24px rgba(212,170,79,0.12);
    }

    .loginBtn:active {
      transform: scale(0.98);
    }

    .loginBtn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Error ── */
    .loginError {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.15);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      backdrop-filter: blur(10px);
    }

    .loginError.visible {
      display: block;
    }

    /* ── Footer ── */
    .loginFooter {
      margin-top: 32px;
      font-size: 10px;
      color: var(--muted-2);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Corner accents ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      pointer-events: none;
      opacity: 0.12;
    }
    .corner--tl { top: 24px; left: 24px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner--tr { top: 24px; right: 24px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    /* ── Light theme overrides ── */
    [data-theme="light"] .loginWordmark[src*="smarteye-light"] {
      display: none;
    }
    [data-theme="light"] .loginWordmarkDark {
      display: inline-block !important;
    }
    .loginWordmarkDark {
      display: none;
      height: 22px;
      margin-bottom: 6px;
      opacity: 0.88;
    }
    [data-theme="light"] .glassCard {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(0, 0, 0, 0.06);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    [data-theme="light"] .fieldRow input {
      border-bottom-color: rgba(0, 0, 0, 0.15);
    }
    [data-theme="light"] .eyeBg {
      opacity: 0.08;
    }
    [data-theme="light"] .ring {
      border-color: rgba(160, 125, 34, 0.08);
    }
    [data-theme="light"] .ring--3 {
      border-color: rgba(160, 125, 34, 0.12);
    }
  </style>
</head>

<body>
  <!-- Corner accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="loginScene">
    <!-- Large eye as background -->
    <img src="/static/smarteye-logo.png" alt="" class="eyeBg" />

    <!-- Subtle rotating rings -->
    <div class="ring ring--1"></div>
    <div class="ring ring--2"></div>
    <div class="ring ring--3"></div>

    <!-- Login content -->
    <div class="loginOverlay">
      <img src="/static/smarteye-light.png" alt="SmartEye" class="loginWordmark" />
      <img src="/static/smarteye-dark.png" alt="SmartEye" class="loginWordmarkDark" />
      <div class="loginTagline">Surveillance Hub</div>

      <div class="glassCard">
        <div class="loginError" id="loginError"></div>

        <form id="loginForm" autocomplete="on">
          <div class="fieldRow">
            <input id="username" name="username" type="text" autocomplete="username" required autofocus
                   placeholder=" " />
            <label for="username">Username</label>
          </div>

          <div class="fieldRow">
            <input id="password" name="password" type="password" autocomplete="current-password" required
                   placeholder=" " />
            <label for="password">Password</label>
          </div>

          <button class="loginBtn" type="submit" id="loginBtn">Authenticate</button>
        </form>
      </div>

      <div class="loginFooter">SmartEye &middot; Denmark</div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.remove("visible");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = "/live";
          return;
        }

        const data = await res.json().catch(() => null);
        const msg = data?.detail || "Authentication failed";
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
      } catch (err) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.classList.add("visible");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>

</html>
