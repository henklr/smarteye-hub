<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — SmartEye Hub</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .loginWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .loginCard {
      width: 100%;
      max-width: 380px;
      padding: 36px 32px 28px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--stroke);
    }

    .loginTitle {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 4px;
      color: var(--text);
    }

    .loginSub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .loginField {
      margin-bottom: 16px;
    }

    .loginField label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .loginField input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--stroke-2);
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }

    .loginField input:focus {
      border-color: var(--accent);
    }

    .loginBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .loginBtn:hover {
      opacity: 0.9;
    }

    .loginBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loginError {
      background: var(--danger-2);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .loginError.visible {
      display: block;
    }
  </style>
</head>

<body>
  <div class="loginWrap">
    <div class="loginCard">
      <div class="loginTitle">SmartEye Hub</div>
      <div class="loginSub">Sign in with your system credentials</div>

      <div class="loginError" id="loginError"></div>

      <form id="loginForm" autocomplete="on">
        <div class="loginField">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        </div>

        <div class="loginField">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="loginBtn" type="submit" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.remove("visible");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = "/live";
          return;
        }

        const data = await res.json().catch(() => null);
        const msg = data?.detail || "Authentication failed";
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
      } catch (err) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.classList.add("visible");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>

</html>
