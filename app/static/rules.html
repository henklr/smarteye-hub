<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rules</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body class="actionsPage">
  <div class="wrap full">
    <div class="topbar">
      <div class="tabs">
        <a class="tab" href="/live"><span class="tabDot"></span>Live</a>
        <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
        <a class="tab active" href="/rules"><span class="tabDot"></span>Rules</a>
      </div>
    </div>

    <div class="split">
      <div class="card">
        <div class="listHeader">
          <div>
            <div class="listTitle">Saved rules</div>
            <div class="listSub">Triggered rules can run ordered actions, including waits and HTTP requests.</div>
          </div>
          <button class="btn btn-primary" id="btnNew" type="button">New rule</button>
        </div>

        <div class="rulesTools">
          <div class="grow">
            <label for="rulesSearch">Search</label>
            <input id="rulesSearch" placeholder="Search by name, trigger, action or device" />
          </div>

          <div class="ruleFilterWrap">
            <label for="rulesFilterStatus">Status</label>
            <select id="rulesFilterStatus">
              <option value="all">All rules</option>
              <option value="enabled">Enabled only</option>
              <option value="disabled">Disabled only</option>
            </select>
          </div>
        </div>

        <div id="rulesList" class="rulesList"></div>

        <div class="statusLine">
          <strong>Status:</strong> <span id="listStatus" class="muted">Ready.</span>
        </div>
      </div>

      <div class="card">
        <div class="formTitle" id="formTitle">New rule</div>

        <div class="grid ruleHeaderGrid">
          <div data-full>
            <label for="ruleName">Rule name</label>
            <input id="ruleName" placeholder="Front door motion" />
          </div>

          <div data-full>
            <label for="ruleEnabled">Status</label>
            <label class="enableRow m-0">
              <input id="ruleEnabled" type="checkbox" checked />
              <span id="ruleEnabledText">Enabled</span>
            </label>
          </div>
        </div>

        <div class="collapseCard mt-12">
          <div class="sectionHead">
            <div>
              <div class="collapseHeadTitle">Triggers</div>
              <div class="collapseHeadSub">A rule is evaluated when any trigger matches.</div>
            </div>
          </div>

          <div class="collapseBody open" id="triggersBody">
            <div class="row2 mt-0">
              <button class="btn" id="btnAddCondition" type="button">Add trigger</button>
            </div>
            <div id="conditionsList" class="itemList mt-10"></div>
          </div>
        </div>

        <div class="collapseCard mt-12">
          <div class="sectionHead">
            <div>
              <div class="collapseHeadTitle">Actions</div>
              <div class="collapseHeadSub">Actions run in display order. You can insert waits between them.</div>
            </div>
          </div>

          <div class="collapseBody open" id="actionsBody">
            <div class="row2 mt-0">
              <button class="btn" id="btnAddAction" type="button">Add action</button>
            </div>
            <div id="actionsList" class="itemList mt-10"></div>
          </div>
        </div>

        <div class="formSticky">
          <div class="formStickyInner">
            <div class="rowSplit">
              <div class="muted" id="editorModeText">Create a new rule.</div>

              <div class="row2 mt-0">
                <button class="btn" id="btnDuplicate" type="button">Duplicate</button>
                <button class="btn btn-danger" id="btnDelete" type="button">Delete</button>
                <button class="btn" id="btnTest" type="button">Test rule</button>
                <button class="btn btn-primary" id="btnSave" type="button">Save</button>
              </div>
            </div>

            <div class="statusLine">
              <strong>Status:</strong> <span id="formStatus" class="muted">Ready.</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template id="conditionTemplate">
    <div class="itemCard conditionCard">
      <div class="itemCollapseBtn" role="button" tabindex="0" aria-expanded="false">
        <div>
          <div class="itemTitle"></div>
          <div class="collapseHeadSub">Trigger details</div>
        </div>

        <div class="itemHeadActions">
          <button class="btn btn-danger btnRemoveCondition" type="button">Remove</button>
          <span class="itemChevron">›</span>
        </div>
      </div>

      <div class="itemCollapseBody">
        <div class="grid itemGrid">
          <div data-full>
            <label>Trigger name</label>
            <input class="condName" placeholder="Optional label, e.g. Front door motion" />
          </div>

          <div data-full>
            <label>Trigger type</label>
            <select class="condType">
              <option value="onvif_event">ONVIF event</option>
              <option value="device_offline">Device offline</option>
              <option value="device_back_online">Device back online</option>
              <option value="incoming_http_request">Incoming HTTP request</option>
            </select>
          </div>

          <div data-full class="condDeviceWrap">
            <label>Device</label>
            <select class="condDevice"></select>
          </div>

          <div data-full class="httpTriggerWrap hidden">
            <label>HTTP method</label>
            <select class="httpMethod">
              <option value="ANY">Any</option>
              <option value="GET">GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>

          <div data-full class="httpTriggerWrap hidden">
            <label>Webhook path</label>
            <div class="row2 mt-0">
              <input class="httpPath grow" placeholder="/webhook/abc123" />
              <button class="btn btnGenerateHttpPath" type="button">Generate</button>
            </div>
          </div>

          <div data-full class="httpTriggerWrap hidden">
            <label>Webhook URL</label>
            <div class="row2 mt-0">
              <input class="httpUrlPreview grow" readonly />
              <button class="btn btnCopyHttpUrl" type="button">Copy</button>
            </div>
            <div class="muted mt-8">Send requests to this URL to trigger the rule.</div>
          </div>
        </div>

        <div class="topicPicker">
          <div class="topicTools">
            <div class="grow">
              <label>Filter topics</label>
              <input class="topicSearch" placeholder="Filter by name or path" />
            </div>

            <div class="topicRefreshWrap">
              <label>&nbsp;</label>
              <button class="btn btnLoadTopics w-full" type="button">Refresh topics</button>
            </div>
          </div>

          <div class="topicSelected selectedTopicText">Select an ONVIF topic for this trigger.</div>
          <div class="muted topicCountText mt-8">No topics loaded yet.</div>
          <div class="topicList"></div>
        </div>

        <div class="itemPreview previewText"></div>
        <div class="errorText validationText hidden"></div>
      </div>
    </div>
  </template>

  <template id="actionTemplate">
    <div class="itemCard actionCard">
      <div class="itemCollapseBtn" role="button" tabindex="0" aria-expanded="false">
        <div>
          <div class="itemTitle"></div>
          <div class="collapseHeadSub">Action details</div>
        </div>

        <div class="itemHeadActions">
          <button class="btn btnMoveUpAction" type="button" title="Move up">↑</button>
          <button class="btn btnMoveDownAction" type="button" title="Move down">↓</button>
          <button class="btn btn-danger btnRemoveAction" type="button">Remove</button>
          <span class="itemChevron">›</span>
        </div>
      </div>

      <div class="itemCollapseBody">
        <div class="grid itemGrid">
          <div data-full>
            <label>Action name</label>
            <input class="actionName" placeholder="Optional label, e.g. Garage relay pulse" />
          </div>

          <div data-full>
            <label>Action type</label>
            <select class="actionType">
              <option value="activate_output_relay">Activate local output relay</option>
              <option value="wait_for">Wait for</option>
              <option value="send_http_request">Send HTTP request</option>
            </select>
          </div>

          <div data-full class="relayModeWrap">
            <label>Relay action</label>
            <select class="relayMode">
              <option value="on">Turn on</option>
              <option value="off">Turn off</option>
              <option value="pulse">Activate for time</option>
            </select>
          </div>

          <div data-full class="relaySecondsWrap hidden">
            <label>Activation time (seconds)</label>
            <input class="relaySeconds" type="number" min="0.1" step="0.1" placeholder="2.0" />
          </div>

          <div data-full class="waitSecondsWrap hidden">
            <label>Wait time (seconds)</label>
            <input class="waitSeconds" type="number" min="0.1" step="0.1" placeholder="2.0" />
          </div>

          <div data-full class="httpActionWrap hidden">
            <label>HTTP method</label>
            <select class="httpActionMethod">
              <option value="POST">POST</option>
              <option value="GET">GET</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>

          <div data-full class="httpActionWrap hidden">
            <label>URL</label>
            <input class="httpActionUrl" placeholder="http://example.local/hook" />
          </div>

          <div data-full class="httpActionWrap hidden">
            <label>Headers (JSON object)</label>
            <textarea class="httpActionHeaders" rows="4" placeholder='{"Authorization":"Bearer token","Content-Type":"application/json"}'></textarea>
          </div>

          <div data-full class="httpActionWrap hidden">
            <label>Body</label>
            <textarea class="httpActionBody" rows="4" placeholder='{"event":"motion"}'></textarea>
          </div>

          <div data-full class="httpActionWrap hidden">
            <label>Timeout (seconds)</label>
            <input class="httpActionTimeout" type="number" min="0.1" step="0.1" placeholder="10" />
          </div>
        </div>

        <div class="itemPreview previewText"></div>
        <div class="errorText validationText hidden"></div>
      </div>
    </div>
  </template>

  <script src="/static/rules.js"></script>
</body>
</html>
