<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Camera Viewer</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Camera Viewer</h1>
        <div class="subtitle">Devices → MediaMTX (cam1) → WebRTC (WHEP)</div>
      </div>
      <div class="headerRight">
        <div class="pill"><span class="dot" id="dot"></span><span id="pillText">Idle</span></div>
        <div class="tabs">
          <a class="tab" href="/"><span class="tabDot"></span>Home</a>
          <a class="tab active" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row2" style="margin-top:0;">
        <div class="grow">
          <label>Device</label>
          <select id="deviceSel" disabled>
            <option>Loading devices…</option>
          </select>
        </div>
        <button class="btn" id="reloadDevices">Reload</button>
      </div>

      <div class="meta">
        <span>Selected profile: <code id="profileLabel">(none)</code></span>
        <span>Path: <code>cam1</code></span>
      </div>

      <div class="row2">
        <button class="btn btn-primary" id="start" disabled>Start</button>
        <button class="btn btn-danger" id="stop" disabled>Stop</button>
      </div>

      <div class="statusLine" id="statusLine">
        <strong>Status:</strong> <span id="statusText">Idle.</span>
      </div>

      <div class="meta">
        <span>Player: <code id="playerUrl">(loading…)</code></span>
        <span>WHEP: <code id="whepUrl"></code></span>
      </div>

      <div class="player">
        <video id="video" autoplay playsinline muted></video>
      </div>
    </div>
  </div>

  <script src="/static/live.js"></script>
</body>

</html>
