<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Camera Viewer</h1>
        <div class="subtitle">Devices → MediaMTX → WebRTC (WHEP)</div>
      </div>

      <div class="headerRight">
        <div class="pill"><span class="dot" id="dot"></span><span id="pillText">Idle</span></div>
        <div class="tabs">
          <a class="tab" href="/"><span class="tabDot"></span>Home</a>
          <a class="tab active" href="/live"><span class="tabDot"></span>Live</a>
          <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
        </div>
      </div>
    </div>

    <div class="liveLayout" id="liveLayout">
      <!-- LEFT: camera list -->
      <div class="card liveSidebar" id="sidebar">
        <div class="listHeader">
          <div>
            <div class="listTitle">Cameras</div>
            <div class="listSub">Click to start/stop. Switching cameras stops the previous stream.</div>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn" id="reload">Reload</button>
            <button class="btn" id="toggleSidebar" title="Hide sidebar">Hide</button>
          </div>
        </div>

        <div id="camList" class="camList">
          <div class="muted" style="padding:10px 2px;">Loading…</div>
        </div>
      </div>

      <!-- RIGHT: player -->
      <div class="card liveMain">
        <!-- when sidebar is hidden, show a small "Show" control here -->
        <div class="row2 liveMainTop">
          <button class="btn" id="showSidebar" style="display:none;">Show cameras</button>
          <div class="meta" style="margin-top:0; flex:1 1 auto;">
            <span>Active: <code id="activeName">(none)</code></span>
            <span>Path: <code id="pathCode">(none)</code></span>
          </div>
        </div>

        <div class="statusLine" id="statusLine">
          <strong>Status:</strong> <span id="statusText">Loading…</span>
        </div>

        <div class="meta">
          <span>Player: <code id="playerUrl">(select a camera)</code></span>
          <span>WHEP: <code id="whepUrl">(select a camera)</code></span>
        </div>

        <div class="player">
          <video id="video" autoplay playsinline muted></video>
        </div>

        <div class="row2">
          <button class="btn btn-danger" id="stop" disabled>Stop</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/live.js"></script>
</body>
</html>
