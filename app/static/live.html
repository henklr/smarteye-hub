<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .tile {
      cursor: default;
    }

    .tile.drag-armed {
      cursor: grab;
    }

    .tile.is-dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .tile:fullscreen,
    .tile:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      margin: 0;
      border-radius: 0;
      background: #000;
    }

    .tile:fullscreen .tilePlayer,
    .tile:-webkit-full-screen .tilePlayer {
      width: 100%;
      height: 100%;
    }

    .tile:fullscreen video,
    .tile:-webkit-full-screen video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .tile video,
    .tileOverlay,
    .tilePtzPanel,
    .tilePtzJoystick,
    .tilePtzZoomBtn,
    .tileStopBtn {
      cursor: default;
    }

    .tilePtzPanel,
    .tilePtzJoystick,
    .tilePtzZoomBtn,
    .tileStopBtn {
      -webkit-user-drag: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <div class="wrap full">
    <div class="topbar">

      <div class="tabs">
        <a class="tab active" href="/live"><span class="tabDot"></span>Live</a>
        <a class="tab" href="/devices"><span class="tabDot"></span>Devices</a>
        <a class="tab" href="/actions"><span class="tabDot"></span>Actions</a>
        <a class="tab" href="/events"><span class="tabDot"></span>Events</a>
        <a class="tab" href="/playback"><span class="tabDot"></span>Playback</a>
      </div>

      <div class="pill" id="statusPill" title="Click to view full status">
        <span class="dot" id="dot"></span>
        <span id="pillText">Idle</span>
      </div>

    </div>

    <div class="liveLayout" id="liveLayout">
      <div class="card liveSidebar" id="sidebar">
        <div class="listHeader">
          <div>
            <div class="listTitle">Cameras</div>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn" id="reload">Reload</button>
            <button class="btn" id="toggleSidebar" title="Hide sidebar">Hide</button>
          </div>
        </div>

        <div class="row2" style="margin-top:0;">
          <button class="btn btn-primary" id="startAll">Start All</button>
          <button class="btn btn-danger" id="stopAll">Stop All</button>
        </div>

        <div id="camList" class="camList" style="margin-top:10px;">
          <div class="muted" style="padding:10px 2px;">Loading…</div>
        </div>
      </div>

      <div class="card liveMain">
        <div class="row2 liveMainTop" style="margin-top:0;">
          <button class="btn" id="showSidebar" style="display:none;">Show cameras</button>
        </div>

        <div class="videoGrid" id="videoGrid"></div>
      </div>
    </div>
  </div>

  <script src="/static/live.js"></script>
</body>
</html>
