<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Camera Viewer</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Camera Viewer</h1>
        <div class="subtitle">Saved Devices → ONVIF → RTSP → MediaMTX → WebRTC (WHEP)</div>
      </div>

      <div style="display:flex; gap:10px; align-items:center;">
        <a class="btn" href="/devices">Devices</a>
        <div class="pill">
          <span class="dot" id="dot"></span>
          <span id="pillText">Idle</span>
        </div>
      </div>
    </div>

    <div class="card">

      <!-- Device selector (no manual entry) -->
      <div class="row2" style="margin-top:0;">
        <div class="grow">
          <label>Device</label>
          <select id="deviceSel" disabled>
            <option>Loading devices…</option>
          </select>
        </div>
        <button class="btn" id="reloadDevices">Reload</button>
      </div>

      <div class="grid" style="margin-top:14px;">
        <div data-full>
          <label>Camera IP</label>
          <input id="ip" placeholder="192.168.1.108" />
        </div>

        <div>
          <label>ONVIF Port</label>
          <input id="onvif_port" value="80" />
        </div>

        <div>
          <label>Username</label>
          <input id="username" placeholder="admin" />
        </div>

        <div>
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <button class="btn" id="fetch" data-full>Fetch profiles</button>
      </div>

      <div class="row2">
        <div class="grow">
          <label>Profile</label>
          <select id="profiles" disabled>
            <option>Select a device & fetch profiles…</option>
          </select>
        </div>
        <button class="btn btn-primary" id="start" disabled>Start</button>
        <button class="btn btn-danger" id="stop" disabled>Stop</button>
      </div>

      <div class="statusLine" id="statusLine">
        <strong>Status:</strong> <span id="statusText">Idle.</span>
      </div>

      <div class="meta">
        <span>Path: <code>cam1</code></span>
        <span>Player: <code id="playerUrl">(loading…)</code></span>
        <span>WHEP: <code id="whepUrl"></code></span>
      </div>

      <div class="player">
        <video id="video" autoplay playsinline muted></video>
      </div>
    </div>
  </div>

  <script src="/static/live.js"></script>
</body>
</html>
