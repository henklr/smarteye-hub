<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartEye Cloud Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #444;
      transition: background 0.3s;
    }
    .dot.on  { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
    .dot.err { background: #f44336; }
    #hdr-right { margin-left: auto; font-size: 0.78rem; color: #666; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px; flex-shrink: 0;
      background: #161616;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sidebar-hdr {
      padding: 10px 14px;
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: #555;
      border-bottom: 1px solid #222;
    }
    .device-block { border-bottom: 1px solid #1e1e1e; }
    .device-name {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      font-size: 0.78rem; font-weight: 600; color: #999;
    }
    .pi-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    .cam-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px 7px 28px;
      font-size: 0.82rem; color: #bbb;
      cursor: pointer;
      transition: background 0.12s;
    }
    .cam-row:hover  { background: #1f1f1f; }
    .cam-row.active { background: #162030; color: #90caf9; }
    .cam-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .cam-dot.live { background: #f44336; box-shadow: 0 0 4px #f4433688; }
    .empty-msg { padding: 20px 14px; font-size: 0.82rem; color: #444; text-align: center; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow: hidden; }

    /* ── Player ── */
    .player-wrap {
      flex: 1; position: relative; background: #000;
      border-radius: 8px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    video { width: 100%; height: 100%; object-fit: contain; display: none; }
    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; color: #333; text-align: center;
    }
    .placeholder svg { width: 56px; height: 56px; opacity: 0.3; }
    .placeholder p { font-size: 0.85rem; }

    .overlay {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      display: none; justify-content: space-between; align-items: flex-end;
    }
    .cam-badge {
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      padding: 4px 10px; border-radius: 4px;
      font-size: 0.78rem;
    }
    .live-badge {
      background: #c62828; padding: 3px 8px; border-radius: 3px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
    }
    .stop-btn {
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      border: 1px solid #555; color: #e0e0e0;
      padding: 5px 12px; border-radius: 4px;
      font-size: 0.78rem; cursor: pointer; transition: background 0.15s;
    }
    .stop-btn:hover { background: #c62828; border-color: #c62828; }

    .spinner {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); flex-direction: column; gap: 12px;
    }
    .spinner-ring {
      width: 36px; height: 36px;
      border: 3px solid #333; border-top-color: #90caf9;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner p { font-size: 0.82rem; color: #aaa; }

    /* ── Status bar ── */
    .status-bar {
      display: flex; gap: 20px; align-items: center;
      padding: 8px 14px;
      background: #161616; border: 1px solid #222; border-radius: 6px;
      font-size: 0.78rem; color: #666; flex-shrink: 0;
    }
    .status-bar .item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .status-bar .sep { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="dot" id="server-dot"></div>
  <h1>SmartEye Cloud Dashboard</h1>
  <span id="hdr-right">No active stream</span>
</header>

<div class="layout">

  <!-- Sidebar: device / camera list -->
  <div class="sidebar">
    <div class="sidebar-hdr">Devices</div>
    <div id="device-list">
      <div class="empty-msg">Connecting to server…</div>
    </div>
  </div>

  <!-- Main: video player + status -->
  <div class="main">

    <div class="player-wrap" id="player-wrap">
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 10.48V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0
                   2-.9 2-2v-4.48l4 3.98v-11l-4 3.5zM16 18H4V6h12v12z"/>
        </svg>
        <p>Select a camera from the sidebar</p>
      </div>

      <video id="video" autoplay muted playsinline></video>

      <div class="spinner" id="spinner">
        <div class="spinner-ring"></div>
        <p id="spinner-msg">Connecting…</p>
      </div>

      <div class="overlay" id="overlay">
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="live-badge">● LIVE</span>
          <span class="cam-badge" id="cam-badge"></span>
        </div>
        <button class="stop-btn" onclick="stopStream()">■ Stop</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="item">
        <div class="dot" id="ws-dot"></div>
        <span id="ws-status">–</span>
      </div>
      <div class="item" id="codec-item" style="display:none">
        <span style="color:#555">codec</span>
        <span id="codec-label"></span>
      </div>
      <div class="item" id="buf-item" style="display:none">
        <span style="color:#555">buffer</span>
        <span id="buf-label"></span>
      </div>
      <div class="sep"></div>
      <div class="item" id="chunks-item" style="display:none">
        <span id="chunks-label"></span>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

// ── Config ──────────────────────────────────────────────────────────────────
const API = '';  // empty = same origin; set to 'https://your-cloud-host' if serving separately

// ── State ────────────────────────────────────────────────────────────────────
let currentStreamId  = null;
let currentDeviceId  = null;
let currentCameraId  = null;
let streamWs         = null;
let mediaSource      = null;
let sourceBuffer     = null;
let chunkQueue       = [];
let sbBusy           = false;
let chunkCount       = 0;
let bufIntervalId    = null;

// ── Device list ──────────────────────────────────────────────────────────────
async function loadDevices() {
  try {
    const res  = await fetch(`${API}/api/devices`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const list = await res.json();
    renderDevices(list);
    dot('server-dot', 'on');
  } catch (e) {
    dot('server-dot', 'err');
    document.getElementById('device-list').innerHTML =
      `<div class="empty-msg">Cannot reach server</div>`;
  }
}

function renderDevices(devices) {
  const el = document.getElementById('device-list');
  if (!devices.length) {
    el.innerHTML = '<div class="empty-msg">No Pi devices connected</div>';
    return;
  }
  el.innerHTML = devices.map(d => `
    <div class="device-block">
      <div class="device-name">
        <span class="pi-dot"></span>${escHtml(d.deviceId)}
      </div>
      ${d.cameras.map(cam => `
        <div class="cam-row" id="cam-${cam.id}"
             onclick="selectCamera('${escAttr(d.deviceId)}','${escAttr(cam.id)}','${escAttr(cam.name)}')">
          <span class="cam-dot" id="camdot-${cam.id}"></span>
          ${escHtml(cam.name)}
        </div>`).join('')}
    </div>`).join('');

  // Restore active highlight if a stream is running
  if (currentCameraId) {
    const row = document.getElementById(`cam-${currentCameraId}`);
    if (row) {
      row.classList.add('active');
      const d = document.getElementById(`camdot-${currentCameraId}`);
      if (d) d.classList.add('live');
    }
  }
}

// ── Stream control ────────────────────────────────────────────────────────────
async function selectCamera(deviceId, cameraId, cameraName) {
  if (currentCameraId === cameraId) return;   // already playing this camera
  if (currentStreamId) await stopStream();

  currentDeviceId = deviceId;
  currentCameraId = cameraId;

  setActiveCam(cameraId, true);
  showSpinner(true, 'Starting stream…');
  setWs('–', false);

  try {
    const res = await fetch(`${API}/api/stream/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deviceId, cameraId }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { streamId } = await res.json();
    currentStreamId = streamId;
    document.getElementById('hdr-right').textContent = cameraName;
    openStreamSocket(streamId, cameraName);
  } catch (err) {
    showSpinner(false);
    setActiveCam(cameraId, false);
    currentCameraId = null;
    setWs(`Failed: ${err.message}`, false);
  }
}

async function stopStream() {
  const sid = currentStreamId;
  currentStreamId = null;
  const cid = currentCameraId;
  currentCameraId = null;

  if (streamWs)         { streamWs.close(); streamWs = null; }
  if (bufIntervalId)    { clearInterval(bufIntervalId); bufIntervalId = null; }
  if (mediaSource && mediaSource.readyState === 'open') {
    try { mediaSource.endOfStream(); } catch { /**/ }
  }
  mediaSource = null; sourceBuffer = null;
  chunkQueue = []; sbBusy = false; chunkCount = 0;

  const video = document.getElementById('video');
  video.pause();
  video.src = '';
  video.style.display = 'none';

  document.getElementById('placeholder').style.display = '';
  document.getElementById('overlay').style.display     = 'none';
  document.getElementById('hdr-right').textContent     = 'No active stream';
  document.getElementById('buf-item').style.display    = 'none';
  document.getElementById('chunks-item').style.display = 'none';
  document.getElementById('codec-item').style.display  = 'none';
  setWs('–', false);
  if (cid) setActiveCam(cid, false);

  if (sid) {
    try { await fetch(`${API}/api/stream/${sid}`, { method: 'DELETE' }); } catch { /**/ }
  }
}

// ── WebSocket + MSE player ───────────────────────────────────────────────────
function openStreamSocket(streamId, cameraName) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = `${proto}//${location.host}/stream/${streamId}`;

  initMSE(cameraName);

  streamWs = new WebSocket(url);
  streamWs.binaryType = 'arraybuffer';

  streamWs.onopen = () => {
    setWs('Connected — buffering…', true);
    showSpinner(true, 'Buffering video…');
  };

  streamWs.onmessage = ({ data }) => {
    if (!(data instanceof ArrayBuffer)) return;
    chunkCount++;
    document.getElementById('chunks-item').style.display = '';
    document.getElementById('chunks-label').textContent  = `${chunkCount} chunks received`;
    enqueueChunk(data);
  };

  streamWs.onclose = () => {
    setWs('Disconnected', false);
    // Pi gone — tear down cleanly
    if (currentStreamId === streamId) stopStream();
  };

  streamWs.onerror = () => setWs('WebSocket error', false);
}

function initMSE(cameraName) {
  const video = document.getElementById('video');
  video.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('overlay').style.display     = 'flex';
  document.getElementById('cam-badge').textContent     = cameraName;

  // Probe for the first supported fMP4/H.264 MIME type
  const CANDIDATES = [
    'video/mp4; codecs="avc1.640028"',   // H.264 High 4.0
    'video/mp4; codecs="avc1.4D401F"',   //          Main 3.1
    'video/mp4; codecs="avc1.42E01E"',   //          Baseline 3.0
    'video/mp4',
  ];
  const mimeType = CANDIDATES.find(t => MediaSource.isTypeSupported(t)) ?? 'video/mp4';
  document.getElementById('codec-label').textContent  = mimeType;
  document.getElementById('codec-item').style.display = '';

  mediaSource = new MediaSource();
  video.src   = URL.createObjectURL(mediaSource);

  mediaSource.addEventListener('sourceopen', () => {
    try {
      sourceBuffer = mediaSource.addSourceBuffer(mimeType);
      sourceBuffer.mode = 'sequence';          // timing is managed by the server
      sourceBuffer.addEventListener('updateend', () => {
        sbBusy = false;
        drainQueue();
        updateBufferDisplay();
      });
      sourceBuffer.addEventListener('error', e =>
        console.error('SourceBuffer error:', e));
    } catch (e) {
      console.error('MSE sourceopen error:', e);
      setWs(`MSE init failed: ${e.message}`, false);
    }
  }, { once: true });

  video.addEventListener('playing', () => {
    showSpinner(false);
    setWs('Streaming', true);
  }, { once: true });

  // Trim old buffer to avoid running out of quota
  bufIntervalId = setInterval(trimBuffer, 5000);
}

function enqueueChunk(ab) {
  chunkQueue.push(ab);
  if (!sbBusy) drainQueue();
}

function drainQueue() {
  if (sbBusy || !chunkQueue.length || !sourceBuffer || !mediaSource) return;
  if (mediaSource.readyState !== 'open') return;
  if (sourceBuffer.updating) return;
  sbBusy = true;
  sourceBuffer.appendBuffer(chunkQueue.shift());
}

function trimBuffer() {
  if (!sourceBuffer || !mediaSource || mediaSource.readyState !== 'open') return;
  if (sourceBuffer.updating) return;
  if (sourceBuffer.buffered.length === 0) return;
  const start = sourceBuffer.buffered.start(0);
  const end   = sourceBuffer.buffered.end(0);
  // Keep last 10 seconds; remove anything older
  if (end - start > 12) {
    try { sourceBuffer.remove(start, end - 10); } catch { /**/ }
  }
}

function updateBufferDisplay() {
  if (!sourceBuffer || sourceBuffer.buffered.length === 0) return;
  const secs = (sourceBuffer.buffered.end(0) - sourceBuffer.buffered.start(0)).toFixed(1);
  document.getElementById('buf-item').style.display  = '';
  document.getElementById('buf-label').textContent   = `${secs}s`;
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function dot(id, state) {
  const el = document.getElementById(id);
  el.className = `dot ${state}`;
}
function setWs(text, connected) {
  dot('ws-dot', connected ? 'on' : '');
  document.getElementById('ws-status').textContent = text;
}
function showSpinner(show, msg) {
  document.getElementById('spinner').style.display    = show ? 'flex' : 'none';
  document.getElementById('spinner-msg').textContent  = msg ?? '';
}
function setActiveCam(cameraId, active) {
  const row  = document.getElementById(`cam-${cameraId}`);
  const cdot = document.getElementById(`camdot-${cameraId}`);
  if (row)  row .classList.toggle('active', active);
  if (cdot) cdot.classList.toggle('live',   active);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

// ── Bootstrap ────────────────────────────────────────────────────────────────
loadDevices();
setInterval(loadDevices, 10_000);  // refresh device list every 10 s
</script>
</body>
</html>
