<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ONVIF Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>ONVIF Demo</h1>
    <p class="muted">Add a camera, view stream, and see events.</p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Add device</h2>
      <form id="addForm">
        <label>Name <input name="name" placeholder="Lobby Cam" required /></label>
        <label>Host <input name="host" placeholder="192.168.1.50" required /></label>
        <label>Port <input name="port" type="number" value="80" required /></label>
        <label>Username <input name="username" placeholder="admin" required /></label>
        <label>Password <input name="password" type="password" required /></label>
        <button type="submit">Add</button>
      </form>
      <div id="addStatus" class="muted"></div>
    </section>

    <section class="card">
      <h2>Devices</h2>
      <div id="deviceList" class="list"></div>
    </section>

    <section class="card">
      <h2>Stream</h2>
      <div class="muted" id="streamStatus">Select a device to view.</div>
      <img id="streamImg" alt="Stream" />
    </section>

    <section class="card">
      <h2>Events</h2>
      <div class="row">
        <button id="clearEvents">Clear</button>
        <span class="muted" id="eventsStatus"></span>
      </div>
      <pre id="eventsBox"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
